<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login con utileria.js</title>
    <link rel="stylesheet" href="css/styles.css">
</head>

<body>

    <div class="contenedor">
        <h1 class="titulo">Inicio de Sesión</h1>

        <form id="formularioLogin" class="formulario">

            <div class="campo">
                <label for="correo">Correo electronico:</label>
                <input type="text" id="correo" name="correo" class="entrada" placeholder="Ejemplo: usuario@gmail.com">
            </div>

            <div class="campo">
                <label for="password">Contraseña:</label>
                <input type="password" id="password" name="password" class="entrada"
                    placeholder="Ingrese su contraseña">
            </div>

            <button type="button" id="botonLogin" name="botonLogin" class="boton">Iniciar sesión</button>
            <button type="reset" id="botonLimpiar" name="botonLimpiar" class="boton">Limpiar</button>
        </form>

        <div class="enlaces">
            <a href="index.html">Volver al registro</a>
        </div>
    </div>

    <!--
aqui se crea una ventana modal
una ventana modal es como un cuadro que aparece encima de la pagina
en este caso se usara para mostrar que el inicio de sesion fue correcto
-->
    <div id="modalLogin" class="modal">

        <!--
    este div es el contenido que va dentro de la ventana modal
    aqui se pone el mensaje, el titulo y el boton para cerrarla
    -->
        <div class="contenido-modal">

            <!--
        este titulo indica que el inicio de sesion fue correcto
        es lo primero que vera el usuario cuando aparezca la ventana
        -->
            <h2>Inicio de sesión correcto</h2>

            <!--
        este parrafo esta vacio porque el mensaje se va a colocar desde javascript
        por ejemplo aqui se puede mostrar el nombre del usuario o algun mensaje personalizado
        -->
            <p id="mensajeLogin"></p>

            <!--
        este boton sirve para cerrar la ventana modal
        cuando el usuario le de clic en aceptar, la ventana se ocultara
        -->
            <button type="button" id="botonCerrarModal" class="boton">Aceptar</button>

        </div>
    </div>

    <!-- Primero se carga la libreria -->
    <script src="js/utileria.js"></script>

    <!-- Despues se usa la libreria -->
    <script src="js/login.js"></script>

</body>

</html>
